<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawSmart — 产品评审演示</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --primary: #FF7A3D;
    --primary-light: #FFF3ED;
    --primary-dark: #E5601A;
    --accent: #2D3B8A;
    --accent-light: #EEF0FF;
    --success: #22C55E;
    --success-light: #F0FDF4;
    --warning: #FCD34D;
    --warning-light: #FFFBEB;
    --text-primary: #1A1A1A;
    --text-secondary: #6B7280;
    --bg: #FAFAFA;
    --surface: #FFFFFF;
    --border: #E5E7EB;
  }

  body {
    font-family: 'DM Sans', 'Noto Sans SC', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
  }

  /* ─── Sidebar ─── */
  .sidebar {
    position: fixed; left:0; top:0; bottom:0; width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    z-index: 100;
    transition: transform 0.3s ease;
  }
  .sidebar.collapsed { transform: translateX(-280px); }

  .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h1 {
    font-size: 20px; font-weight: 700; color: var(--primary);
    display: flex; align-items: center; gap: 8px;
  }
  .sidebar-header h1 span { font-size: 24px; }
  .sidebar-header p {
    font-size: 12px; color: var(--text-secondary); margin-top: 4px;
  }

  .sidebar-nav {
    flex: 1; overflow-y: auto; padding: 12px 0;
  }
  .sidebar-nav::-webkit-scrollbar { width: 4px; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .nav-group { margin-bottom: 8px; }
  .nav-group-title {
    padding: 8px 20px 4px;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-secondary);
  }
  .nav-item {
    padding: 8px 20px; cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--text-secondary);
    display: flex; align-items: center; gap: 10px;
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }
  .nav-item:hover { background: var(--primary-light); color: var(--text-primary); }
  .nav-item.active {
    background: var(--primary-light); color: var(--primary);
    border-left-color: var(--primary); font-weight: 600;
  }
  .nav-item .num {
    width: 22px; height: 22px; border-radius: 6px;
    background: var(--border); color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0;
  }
  .nav-item.active .num { background: var(--primary); color: white; }

  .sidebar-footer {
    padding: 16px 20px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text-secondary); text-align: center;
  }

  /* ─── Main Area ─── */
  .main {
    margin-left: 280px; height: 100vh;
    display: flex; flex-direction: column;
    transition: margin-left 0.3s ease;
  }
  .main.expanded { margin-left: 0; }

  /* Top bar */
  .topbar {
    height: 56px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px;
    gap: 16px; flex-shrink: 0;
  }
  .topbar-toggle {
    width: 36px; height: 36px; border-radius: 8px;
    border: 1px solid var(--border); background: white;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--text-secondary);
  }
  .topbar-toggle:hover { background: var(--primary-light); color: var(--primary); }

  .topbar-breadcrumb {
    font-size: 13px; color: var(--text-secondary);
  }
  .topbar-breadcrumb strong { color: var(--text-primary); font-weight: 600; }

  .topbar-actions { margin-left: auto; display: flex; gap: 8px; }
  .topbar-btn {
    padding: 6px 14px; border-radius: 8px; font-size: 12px;
    font-weight: 600; cursor: pointer; border: 1px solid var(--border);
    background: white; color: var(--text-secondary);
    transition: all 0.15s;
  }
  .topbar-btn:hover { border-color: var(--primary); color: var(--primary); }
  .topbar-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

  .mode-indicator {
    font-size: 11px; padding: 4px 10px; border-radius: 6px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .mode-indicator.present { background: var(--primary-light); color: var(--primary); }
  .mode-indicator.explore { background: var(--accent-light); color: var(--accent); }

  /* ─── Content Area ─── */
  .content {
    flex: 1; overflow: hidden; display: flex;
    position: relative;
  }

  /* ─── Slide View (Presentation Mode) ─── */
  .slide-view {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 40px; gap: 48px; overflow-y: auto; overflow-x: hidden;
    background: linear-gradient(135deg, #f5f5f5 0%, #fafafa 50%, #f0f0f0 100%);
  }

  .phone-frame {
    width: 280px; min-width: 280px;
    background: white;
    border-radius: 40px;
    padding: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.06);
    position: relative;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .phone-frame:hover { transform: translateY(-4px); }
  .phone-inner {
    border-radius: 30px; overflow: hidden;
    background: white;
  }
  .phone-inner img {
    width: 100%; display: block;
  }
  .phone-notch {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 28px; background: black; border-radius: 0 0 16px 16px;
    z-index: 10;
  }
  .phone-label {
    text-align: center; margin-top: 12px;
    font-size: 12px; font-weight: 600; color: var(--text-secondary);
  }

  .slide-info {
    max-width: 420px; flex-shrink: 1;
  }
  .slide-phase {
    display: inline-block; padding: 4px 12px; border-radius: 8px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 12px;
  }
  .slide-phase.onboarding { background: var(--primary-light); color: var(--primary); }
  .slide-phase.setup { background: var(--accent-light); color: var(--accent); }
  .slide-phase.conversion { background: var(--warning-light); color: #92700C; }
  .slide-phase.main { background: var(--success-light); color: #166534; }
  .slide-phase.ai { background: #F0E7FF; color: #6B21A8; }
  .slide-phase.profile { background: #FFF1F2; color: #BE123C; }
  .slide-phase.empty { background: #F0F9FF; color: #0369A1; }

  .slide-title {
    font-size: 28px; font-weight: 700; line-height: 1.2;
    margin-bottom: 8px; color: var(--text-primary);
  }
  .slide-subtitle {
    font-size: 15px; color: var(--text-secondary); line-height: 1.6;
    margin-bottom: 20px;
  }

  .slide-features { list-style: none; }
  .slide-features li {
    padding: 8px 0; font-size: 14px; line-height: 1.5;
    display: flex; align-items: flex-start; gap: 10px;
    color: var(--text-primary);
  }
  .slide-features li::before {
    content: '';
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--primary); margin-top: 7px; flex-shrink: 0;
  }
  .slide-features li small {
    display: block; color: var(--text-secondary); font-size: 12px; margin-top: 2px;
  }

  .slide-tag {
    display: inline-block; padding: 3px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 600; margin-right: 6px; margin-bottom: 4px;
  }
  .slide-tag.free { background: var(--success-light); color: #166534; }
  .slide-tag.premium { background: var(--primary-light); color: var(--primary); }
  .slide-tag.new { background: var(--accent-light); color: var(--accent); }
  .slide-tag.v11 { background: #F0F9FF; color: #0369A1; }

  .slide-callout {
    margin-top: 20px; padding: 14px 16px;
    background: var(--primary-light); border-radius: 12px;
    border-left: 3px solid var(--primary);
  }
  .slide-callout-title {
    font-size: 12px; font-weight: 700; color: var(--primary);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
  }
  .slide-callout p { font-size: 13px; color: var(--text-primary); line-height: 1.5; }

  .slide-metrics {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px;
  }
  .metric-card {
    padding: 12px; border-radius: 10px;
    background: white; border: 1px solid var(--border);
  }
  .metric-card .value {
    font-size: 20px; font-weight: 700; color: var(--primary);
  }
  .metric-card .label {
    font-size: 11px; color: var(--text-secondary); margin-top: 2px;
  }

  /* Compare view (empty states) */
  .phone-pair {
    display: flex; gap: 24px; align-items: flex-start;
  }
  .phone-frame.small { width: 220px; min-width: 220px; }
  .phone-frame.small .phone-inner { border-radius: 26px; }

  /* ─── Navigation Arrows ─── */
  .nav-arrow {
    position: fixed; top: 50%; transform: translateY(-50%);
    width: 48px; height: 48px; border-radius: 50%;
    background: white; border: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: var(--text-secondary);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transition: all 0.2s; z-index: 50;
  }
  .nav-arrow:hover { background: var(--primary); color: white; border-color: var(--primary); }
  .nav-arrow.prev { left: 296px; }
  .nav-arrow.next { right: 16px; }
  .main.expanded .nav-arrow.prev { left: 16px; }

  /* ─── Progress Bar ─── */
  .progress-bar {
    height: 3px; background: var(--border); flex-shrink: 0;
  }
  .progress-fill {
    height: 100%; background: var(--primary);
    transition: width 0.3s ease;
  }

  /* ─── Overview Grid Mode ─── */
  .overview-grid {
    flex: 1; overflow-y: auto; padding: 40px;
    display: none;
  }
  .overview-grid.active { display: block; }
  .slide-view.hidden { display: none; }

  .grid-section-title {
    font-size: 14px; font-weight: 700; color: var(--text-primary);
    margin-bottom: 16px; margin-top: 32px;
    padding-bottom: 8px; border-bottom: 2px solid var(--primary);
    display: flex; align-items: center; gap: 8px;
  }
  .grid-section-title:first-child { margin-top: 0; }
  .grid-section-title .badge {
    font-size: 10px; padding: 2px 8px; border-radius: 4px;
    background: var(--primary-light); color: var(--primary); font-weight: 600;
  }

  .screen-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px; margin-bottom: 16px;
  }
  .screen-thumb {
    cursor: pointer; border-radius: 16px; overflow: hidden;
    border: 2px solid transparent;
    transition: all 0.2s; background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .screen-thumb:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
  .screen-thumb img { width: 100%; display: block; }
  .screen-thumb-label {
    padding: 8px 10px; font-size: 11px; font-weight: 600;
    color: var(--text-secondary); text-align: center;
  }

  /* ─── Keyboard hints ─── */
  .keyboard-hints {
    position: fixed; bottom: 16px; right: 16px; z-index: 200;
    display: flex; gap: 6px; opacity: 0.5;
    transition: opacity 0.2s;
  }
  .keyboard-hints:hover { opacity: 1; }
  .kbd {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 28px; height: 24px; padding: 0 6px;
    background: white; border: 1px solid var(--border);
    border-radius: 4px; font-size: 11px; font-weight: 600;
    color: var(--text-secondary);
  }
  .kbd-label { font-size: 10px; color: var(--text-secondary); margin: 0 4px; }

  /* ─── Diagram: Full-width canvas ─── */
  .diagram-canvas {
    width: 100%; display: flex; flex-direction: column; align-items: center;
    padding: 0 40px 60px;
  }
  .diagram-canvas .diagram-title-row {
    display: flex; align-items: center; gap: 12px; margin-bottom: 6px; align-self: flex-start;
  }
  .diagram-canvas .diagram-title-row h2 { font-size: 22px; font-weight: 700; }
  .diagram-canvas .diagram-desc {
    font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; align-self: flex-start; max-width: 700px; line-height: 1.6;
  }

  /* ─── Persona Cards ─── */
  .persona-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 900px; }
  .persona-card {
    background: white; border-radius: 16px; padding: 24px;
    border: 1px solid var(--border); position: relative; overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .persona-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
  .persona-card.primary { border-color: var(--primary); }
  .persona-card .share-badge {
    position: absolute; top: 16px; right: 16px;
    padding: 3px 10px; border-radius: 8px; font-size: 12px; font-weight: 700;
  }
  .persona-card.primary .share-badge { background: var(--primary-light); color: var(--primary); }
  .persona-card:not(.primary) .share-badge { background: var(--accent-light); color: var(--accent); }
  .persona-avatar {
    width: 48px; height: 48px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 24px; margin-bottom: 12px;
  }
  .persona-card.primary .persona-avatar { background: var(--primary-light); }
  .persona-card:nth-child(2) .persona-avatar { background: #FEF3C7; }
  .persona-card:nth-child(3) .persona-avatar { background: #DBEAFE; }
  .persona-card:nth-child(4) .persona-avatar { background: #F3E8FF; }
  .persona-name { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
  .persona-demo { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
  .persona-need {
    font-size: 13px; line-height: 1.5; color: var(--text-primary);
    padding: 8px 12px; background: var(--bg); border-radius: 8px; margin-bottom: 10px;
  }
  .persona-need strong { color: var(--primary); }
  .persona-traits { display: flex; flex-wrap: wrap; gap: 4px; }
  .persona-trait {
    font-size: 10px; padding: 2px 8px; border-radius: 4px;
    background: var(--bg); color: var(--text-secondary); font-weight: 500;
  }

  /* ─── Architecture Diagram ─── */
  .arch-wrapper { width: 100%; max-width: 960px; }
  .arch-top-bar {
    display: flex; align-items: center; justify-content: center; gap: 32px;
    margin-bottom: 20px;
  }
  .arch-tab-icon {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer; transition: transform 0.2s;
  }
  .arch-tab-icon:hover { transform: scale(1.05); }
  .arch-tab-circle {
    width: 56px; height: 56px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 700; color: white;
  }
  .arch-tab-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .arch-tab-icon.active .arch-tab-label { color: var(--primary); font-weight: 700; }

  .arch-columns {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
  }
  .arch-column {
    background: white; border-radius: 16px; padding: 16px;
    border: 1px solid var(--border); min-height: 240px;
  }
  .arch-column.highlight { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }
  .arch-col-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    padding-bottom: 10px; border-bottom: 2px solid var(--border);
  }
  .arch-col-header.h-orange { border-bottom-color: var(--primary); }
  .arch-col-header.h-blue { border-bottom-color: var(--accent); }
  .arch-col-header.h-purple { border-bottom-color: #7C3AED; }
  .arch-col-header.h-rose { border-bottom-color: #E11D48; }
  .arch-col-icon { font-size: 18px; }
  .arch-col-title { font-size: 13px; font-weight: 700; }
  .arch-feat {
    padding: 6px 0; font-size: 12px; color: var(--text-primary);
    display: flex; align-items: center; gap: 6px; line-height: 1.4;
  }
  .arch-feat .dot {
    width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
  }
  .arch-feat .dot.orange { background: var(--primary); }
  .arch-feat .dot.blue { background: var(--accent); }
  .arch-feat .dot.purple { background: #7C3AED; }
  .arch-feat .dot.rose { background: #E11D48; }
  .arch-feat .badge-sm {
    font-size: 9px; padding: 1px 5px; border-radius: 3px;
    font-weight: 600; margin-left: auto; flex-shrink: 0;
  }
  .arch-feat .badge-sm.free { background: var(--success-light); color: #166534; }
  .arch-feat .badge-sm.pro { background: var(--primary-light); color: var(--primary); }
  .arch-feat .badge-sm.v11 { background: #F0F9FF; color: #0369A1; }

  .arch-infra {
    margin-top: 16px; padding: 14px 20px;
    background: white; border-radius: 12px;
    border: 1px dashed var(--border);
    display: flex; align-items: center; justify-content: center; gap: 24px;
  }
  .arch-infra-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-secondary); font-weight: 500;
  }
  .arch-infra-item .icon { font-size: 16px; }

  /* ─── Journey Map ─── */
  .journey-wrapper { width: 100%; max-width: 960px; }
  .journey-track {
    display: flex; gap: 0; position: relative; overflow-x: auto;
    padding-bottom: 16px;
  }
  .journey-track::-webkit-scrollbar { height: 4px; }
  .journey-track::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .journey-phase {
    flex: 1; min-width: 155px; position: relative;
  }
  .journey-phase:not(:last-child)::after {
    content: ''; position: absolute; right: -1px; top: 38px;
    width: 2px; height: calc(100% - 58px); background: var(--border);
    z-index: 1;
  }
  .journey-phase-header {
    padding: 8px 12px; border-radius: 10px 10px 0 0;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; text-align: center;
  }
  .journey-phase-header.jp-discover { background: #DBEAFE; color: #1E40AF; }
  .journey-phase-header.jp-onboard { background: var(--primary-light); color: var(--primary); }
  .journey-phase-header.jp-convert { background: var(--warning-light); color: #92700C; }
  .journey-phase-header.jp-engage { background: var(--success-light); color: #166534; }
  .journey-phase-header.jp-habit { background: #F3E8FF; color: #6B21A8; }
  .journey-phase-header.jp-retain { background: #FFF1F2; color: #BE123C; }

  .journey-body {
    padding: 12px; border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 10px 10px; background: white; min-height: 280px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .journey-section-label {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    color: var(--text-secondary); letter-spacing: 0.5px; margin-top: 4px;
  }
  .journey-action {
    font-size: 11px; color: var(--text-primary); line-height: 1.4;
    padding: 4px 8px; background: var(--bg); border-radius: 6px;
  }
  .journey-emotion {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600;
  }
  .journey-emotion .emoji { font-size: 16px; }
  .journey-touchpoint {
    font-size: 10px; color: var(--text-secondary); font-style: italic;
    padding: 3px 8px; border-left: 2px solid var(--border);
  }
  .journey-pain {
    font-size: 10px; color: #DC2626; padding: 3px 8px;
    background: #FEF2F2; border-radius: 4px;
  }
  .journey-arrow-row {
    display: flex; align-items: center; justify-content: center;
    gap: 4px; padding: 12px 0 4px;
  }
  .journey-arrow-row .arrow-line {
    flex: 1; height: 2px; background: linear-gradient(90deg, var(--primary), var(--accent));
    border-radius: 1px;
  }
  .journey-arrow-row .arrow-head {
    font-size: 14px; color: var(--accent); font-weight: 700;
  }
  .journey-arrow-label {
    text-align: center; font-size: 10px; color: var(--text-secondary);
    font-weight: 500; margin-bottom: 8px;
  }

  /* When slide-view contains a diagram, align to top */
  .slide-view:has(.diagram-canvas) {
    align-items: flex-start;
    justify-content: flex-start;
    padding: 0;
  }

  /* ─── Animations ─── */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes phoneIn {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .slide-view .slide-info { animation: slideIn 0.4s ease; }
  .slide-view .phone-frame { animation: phoneIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }

  /* ─── Flow Arrow ─── */
  .flow-arrow {
    display: flex; align-items: center; gap: 8px; margin-top: 16px;
    font-size: 12px; color: var(--text-secondary); font-weight: 500;
  }

// INIT
// ────────────────────────────────────────
function init() {
  buildSidebar();
  renderSlide(0);
  buildOverview();
}

function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  let html = '';
  let groupMap = {};

  SLIDES.forEach((s, i) => {
    const g = s.group || s.id;
    if (!groupMap[g]) groupMap[g] = [];
    groupMap[g].push({ slide: s, index: i });
  });

  GROUPS.forEach(g => {
    const items = groupMap[g.id];
    if (!items) return;
    html += `<div class="nav-group">
      <div class="nav-group-title">${g.icon} ${g.label}</div>`;
    items.forEach(({ slide, index }) => {
      const label = slide.title;
      html += `<div class="nav-item" data-index="${index}" onclick="goTo(${index})">
        <span class="num">${index + 1}</span> ${label}
      </div>`;
    });
    html += `</div>`;
  });

  nav.innerHTML = html;
}

// ────────────────────────────────────────
// RENDER SLIDE
// ────────────────────────────────────────
function renderSlide(index) {
  currentSlide = index;
  const slide = SLIDES[index];
  const view = document.getElementById('slideView');

  // ─── Diagram slides (full-width, no phone frame) ───
  if (slide.type === 'persona') {
    let cards = '';
    slide.personas.forEach(p => {
      const pClass = p.primary ? ' primary' : '';
      let traits = '';
      p.traits.forEach(t => { traits += `<span class="persona-trait">${t}</span>`; });
      cards += `<div class="persona-card${pClass}">
        <span class="share-badge">${p.share}</span>
        <div class="persona-avatar">${p.emoji}</div>
        <div class="persona-name">${p.name}</div>
        <div class="persona-demo">${p.demo}</div>
        <div class="persona-need">${p.need}</div>
        <div class="persona-traits">${traits}</div>
      </div>`;
    });
    view.innerHTML = `<div class="diagram-canvas">
      <div class="diagram-title-row">
        <div class="slide-phase ${slide.phase}">${slide.phaseLabel}</div>
      </div>
      <h2 class="slide-title" style="align-self:flex-start">${slide.title}</h2>
      <p class="diagram-desc">${slide.subtitle}</p>
      <div class="persona-grid">${cards}</div>
    </div>`;
    updateNav(index, slide);
    return;
  }

  if (slide.type === 'architecture') {
    let tabBar = '';
    slide.archTabs.forEach((t, i) => {
      tabBar += `<div class="arch-tab-icon${i === 0 ? ' active' : ''}">
        <div class="arch-tab-circle" style="background:${t.color}">${t.icon}</div>
        <span class="arch-tab-label">${t.label}</span>
      </div>`;
    });
    let cols = '';
    slide.archColumns.forEach(c => {
      let feats = '';
      c.features.forEach(f => {
        const badge = f.badge ? `<span class="badge-sm ${f.badge}">${f.badge === 'free' ? '免费' : f.badge === 'pro' ? 'PRO' : 'v1.1'}</span>` : '';
        feats += `<div class="arch-feat"><span class="dot ${c.dotClass}"></span>${f.text}${badge}</div>`;
      });
      cols += `<div class="arch-column">
        <div class="arch-col-header ${c.headerClass}"><span class="arch-col-icon">${c.icon}</span><span class="arch-col-title">${c.title}</span></div>
        ${feats}
      </div>`;
    });
    let infra = '';
    slide.archInfra.forEach(i => { infra += `<div class="arch-infra-item"><span class="icon">${i.icon}</span>${i.text}</div>`; });
    view.innerHTML = `<div class="diagram-canvas">
      <div class="diagram-title-row">
        <div class="slide-phase ${slide.phase}">${slide.phaseLabel}</div>
      </div>
      <h2 class="slide-title" style="align-self:flex-start">${slide.title}</h2>
      <p class="diagram-desc">${slide.subtitle}</p>
      <div class="arch-wrapper">
        <div class="arch-top-bar">${tabBar}</div>
        <div class="arch-columns">${cols}</div>
        <div class="arch-infra">${infra}</div>
      </div>
    </div>`;
    updateNav(index, slide);
    return;
  }

  if (slide.type === 'journey') {
    let phases = '';
    slide.journeyPhases.forEach(p => {
      let actions = '';
      p.actions.forEach(a => { actions += `<div class="journey-action">${a}</div>`; });
      phases += `<div class="journey-phase">
        <div class="journey-phase-header ${p.headerClass}">${p.name}</div>
        <div class="journey-body">
          <div class="journey-section-label">用户行为</div>
          ${actions}
          <div class="journey-section-label">情绪</div>
          <div class="journey-emotion"><span class="emoji">${p.emotion.emoji}</span><span style="color:${p.emotion.color}">${p.emotion.text}</span></div>
          <div class="journey-section-label">关键触点</div>
          <div class="journey-touchpoint">${p.touchpoint}</div>
          <div class="journey-section-label">痛点 / 机会</div>
          <div class="journey-pain">⚠ ${p.pain}</div>
        </div>
      </div>`;
    });
    view.innerHTML = `<div class="diagram-canvas">
      <div class="diagram-title-row">
        <div class="slide-phase ${slide.phase}">${slide.phaseLabel}</div>
      </div>
      <h2 class="slide-title" style="align-self:flex-start">${slide.title}</h2>
      <p class="diagram-desc">${slide.subtitle}</p>
      <div class="journey-wrapper">
        <div class="journey-arrow-row"><div class="arrow-line"></div><span class="arrow-head">▶</span></div>
        <div class="journey-arrow-label">用户旅程时间线 — 从发现到留存</div>
        <div class="journey-track">${phases}</div>
      </div>
    </div>`;
    updateNav(index, slide);
    return;
  }

  // Phone(s)
  let phoneHTML = '';
  if (slide.screens.length === 0) {
    // No phone — title/summary slides
    phoneHTML = '';
  } else if (slide.compareScreen) {
    // Compare: normal + empty side by side
    phoneHTML = `<div class="phone-pair">
      <div class="phone-frame small">
        <div class="phone-inner"><img src="${IMG_BASE}${slide.compareScreen}.png" alt="正常态" loading="lazy"></div>
        <div class="phone-label">正常态</div>
      </div>
      <div class="phone-frame small">
        <div class="phone-inner"><img src="${IMG_BASE}${slide.screens[0]}.png" alt="空态" loading="lazy"></div>
        <div class="phone-label">首次打开</div>
      </div>
    </div>`;
  } else {
    phoneHTML = `<div class="phone-frame">
      <div class="phone-inner"><img src="${IMG_BASE}${slide.screens[0]}.png" alt="${slide.title}" loading="lazy"></div>
    </div>`;
  }

  // Tags
  let tagsHTML = '';
  if (slide.tags) {
    tagsHTML = '<div style="margin-bottom:12px">';
    slide.tags.forEach(t => {
      const [cls, label] = t.split(':');
      tagsHTML += `<span class="slide-tag ${cls}">${label}</span>`;
    });
    tagsHTML += '</div>';
  }

  // Features
  let featuresHTML = '';
  if (slide.features) {
    featuresHTML = '<ul class="slide-features">';
    slide.features.forEach(f => {
      featuresHTML += `<li><span>${f.text}</span></li>`;
    });
    featuresHTML += '</ul>';
  }

  // Callout
  let calloutHTML = '';
  if (slide.callout) {
    calloutHTML = `<div class="slide-callout">
      <div class="slide-callout-title">${slide.callout.title}</div>
      <p>${slide.callout.text}</p>
    </div>`;
  }

  // Metrics
  let metricsHTML = '';
  if (slide.metrics) {
    metricsHTML = '<div class="slide-metrics">';
    slide.metrics.forEach(m => {
      metricsHTML += `<div class="metric-card"><div class="value">${m.value}</div><div class="label">${m.label}</div></div>`;
    });
    metricsHTML += '</div>';
  }

  // Flow arrow
  let flowHTML = '';
  if (slide.flow) {
    const targetIdx = SLIDES.findIndex(s => s.id === slide.flow.target);
    flowHTML = `<div class="flow-arrow">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="dest" onclick="goTo(${targetIdx})">${slide.flow.text}</span>
    </div>`;
  }

  view.innerHTML = `
    ${phoneHTML}
    <div class="slide-info" key="${index}">
      <div class="slide-phase ${slide.phase}">${slide.phaseLabel}</div>
      <h2 class="slide-title">${slide.title}</h2>
      <p class="slide-subtitle">${slide.subtitle}</p>
      ${tagsHTML}
      ${featuresHTML}
      ${metricsHTML}
      ${calloutHTML}
      ${flowHTML}
    </div>
  `;

  updateNav(index, slide);
}

function updateNav(index, slide) {
  // Update sidebar
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.index) === index);
  });
  const activeItem = document.querySelector('.nav-item.active');
  if (activeItem) activeItem.scrollIntoView({ block: 'nearest' });

  // Breadcrumb
  const groupInfo = GROUPS.find(g => g.id === (slide.group || slide.id));
  document.getElementById('breadcrumb').innerHTML =
    `${groupInfo ? groupInfo.icon + ' ' + groupInfo.label : ''} <strong>${slide.title}</strong> &nbsp;·&nbsp; ${index + 1}/${SLIDES.length}`;

  // Progress
  document.getElementById('progressFill').style.width =
    `${((index + 1) / SLIDES.length) * 100}%`;
}

// ────────────────────────────────────────
// OVERVIEW GRID
// ────────────────────────────────────────
function buildOverview() {
  const grid = document.getElementById('overviewGrid');
  let html = '';

  const diagramIcons = { persona: '👥', architecture: '🏗️', journey: '🗺️' };

  GROUPS.forEach(g => {
    const items = SLIDES.filter(s => (s.group || s.id) === g.id && (s.screens.length > 0 || s.type));
    if (items.length === 0) return;

    const countLabel = items.some(s => s.type) ? `${items.length} slides` : `${items.length} screens`;
    html += `<div class="grid-section-title">${g.icon} ${g.label} <span class="badge">${countLabel}</span></div>`;
    html += '<div class="screen-grid">';
    items.forEach(s => {
      const idx = SLIDES.indexOf(s);
      if (s.type) {
        // Diagram slide — show an icon card instead of screenshot
        html += `<div class="screen-thumb" onclick="goTo(${idx}); setMode('present');" style="display:flex;align-items:center;justify-content:center;min-height:200px;background:linear-gradient(135deg,var(--primary-light),var(--accent-light));">
          <div style="text-align:center;padding:20px;">
            <div style="font-size:40px;margin-bottom:8px;">${diagramIcons[s.type] || '📊'}</div>
            <div class="screen-thumb-label" style="padding:0;font-size:13px;font-weight:700;color:var(--text-primary);">${s.title}</div>
          </div>
        </div>`;
      } else {
        html += `<div class="screen-thumb" onclick="goTo(${idx}); setMode('present');">
          <img src="${IMG_BASE}${s.screens[0]}.png" alt="${s.title}" loading="lazy">
          <div class="screen-thumb-label">${s.title}</div>
        </div>`;
      }
    });
    html += '</div>';
  });

  grid.innerHTML = html;
}

// NAVIGATION
// ────────────────────────────────────────
function navigate(dir) {
  const next = currentSlide + dir;
  if (next >= 0 && next < SLIDES.length) {
    goTo(next);
  }
}

function goTo(index) {
  if (mode !== 'present') setMode('present');
  renderSlide(index);
}

function setMode(m) {
  mode = m;
  const sv = document.getElementById('slideView');
  const og = document.getElementById('overviewGrid');
  const bp = document.getElementById('btnPresent');
  const bo = document.getElementById('btnOverview');
  const mt = document.getElementById('modeTag');

  if (m === 'present') {
    sv.classList.remove('hidden');
    og.classList.remove('active');
    bp.classList.add('active');
    bo.classList.remove('active');
    mt.className = 'mode-indicator present';
    mt.textContent = 'PRESENT';
    renderSlide(currentSlide);
  } else {
    sv.classList.add('hidden');
    og.classList.add('active');
    bp.classList.remove('active');
    bo.classList.add('active');
    mt.className = 'mode-indicator explore';
    mt.textContent = 'OVERVIEW';
  }
}

// Sidebar toggle
document.getElementById('toggleSidebar').addEventListener('click', () => {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  document.getElementById('main').classList.toggle('expanded', !sidebarOpen);
});

// ────────────────────────────────────────
// KEYBOARD
// ────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navigate(1); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); navigate(-1); }
  if (e.key === 'g' || e.key === 'G') { setMode(mode === 'present' ? 'overview' : 'present'); }
  if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
  if (e.key === 'Escape') {
    if (document.fullscreenElement) document.exitFullscreen();
  }
});

// Touch swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].clientX; });
document.addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 60) navigate(diff < 0 ? 1 : -1);
});

// Start
init();
</script>
</body>
</html>
